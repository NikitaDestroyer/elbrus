<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Special Surprise For You</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Montserrat:wght@300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
      background: #0b0e1a;
    }

    /* ── Mountain Scene ── */
    .scene {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .sky {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        #0b0e1a 0%,
        #1a1e3a 20%,
        #2e3a6e 40%,
        #6b5b8a 60%,
        #c4727f 75%,
        #f0a07a 85%,
        #fcd89d 95%
      );
    }

    .stars {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    .mountains {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 65%;
    }

    /* Back range */
    .mountain-range-back {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 100%;
    }

    .mountain-range-back svg {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 100%;
    }

    /* Snow glow */
    .snow-glow {
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255,200,150,0.15) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 1;
    }

    /* Clouds */
    .cloud {
      position: absolute;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
      filter: blur(20px);
    }

    .cloud-1 { width: 300px; height: 60px; top: 30%; left: 10%; animation: drift 60s linear infinite; }
    .cloud-2 { width: 400px; height: 50px; top: 25%; left: 60%; animation: drift 80s linear infinite reverse; }
    .cloud-3 { width: 250px; height: 40px; top: 40%; left: 35%; animation: drift 70s linear infinite; }

    @keyframes drift {
      0% { transform: translateX(0); }
      50% { transform: translateX(80px); }
      100% { transform: translateX(0); }
    }

    /* ── Password Modal ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
      transition: opacity 0.8s, visibility 0.8s;
    }

    .overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .modal {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      animation: floatIn 1s ease-out;
    }

    @keyframes floatIn {
      0% { opacity: 0; transform: translateY(30px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal h1 {
      font-family: 'Caveat', cursive;
      font-size: 2.2rem;
      color: #fcd89d;
      margin-bottom: 8px;
    }

    .modal p.subtitle {
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      font-weight: 300;
      margin-bottom: 32px;
    }

    .input-group {
      position: relative;
      margin-bottom: 16px;
    }

    .input-group input {
      width: 100%;
      padding: 16px 20px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .input-group input::placeholder {
      color: rgba(255,255,255,0.35);
    }

    .input-group input:focus {
      border-color: rgba(252,216,157,0.5);
      box-shadow: 0 0 20px rgba(252,216,157,0.1);
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #c4727f, #f0a07a);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(196,114,127,0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .error-msg {
      margin-top: 16px;
      min-height: 24px;
      color: #ffb4b4;
      font-size: 0.9rem;
      font-weight: 300;
      transition: opacity 0.3s;
      font-style: italic;
    }

    .hearts {
      margin-top: 12px;
      font-size: 1.1rem;
      opacity: 0.5;
    }

    /* Shake animation */
    .shake {
      animation: shake 0.5s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-10px); }
      40% { transform: translateX(10px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    /* ── Video Section ── */
    .video-container {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(11, 14, 26, 0.95);
      opacity: 0;
      visibility: hidden;
      transition: opacity 1s, visibility 1s;
    }

    .video-container.visible {
      opacity: 1;
      visibility: visible;
    }

    .video-container h2 {
      font-family: 'Caveat', cursive;
      font-size: 2.5rem;
      color: #fcd89d;
      margin-bottom: 24px;
      animation: fadeInDown 1s ease-out 0.5s both;
    }

    @keyframes fadeInDown {
      0% { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .video-wrapper {
      width: 90%;
      max-width: 800px;
      aspect-ratio: 16/9;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: fadeInUp 1s ease-out 0.8s both;
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Falling hearts animation */
    .falling-heart {
      position: fixed;
      z-index: 25;
      font-size: 1.5rem;
      animation: fall linear forwards;
      pointer-events: none;
    }

    @keyframes fall {
      0% { opacity: 1; transform: translateY(-20px) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .modal { padding: 32px 24px; }
      .modal h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <!-- Mountain Scene -->
  <div class="scene">
    <div class="sky"></div>
    <div class="stars" id="stars"></div>
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="snow-glow"></div>
    <div class="mountains">
      <svg viewBox="0 0 1440 600" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute;bottom:0;width:100%;height:100%;">
        <!-- Far mountains -->
        <polygon points="0,600 200,200 400,350 500,180 700,300 800,150 1000,280 1100,170 1300,320 1440,250 1440,600" fill="#1a1e3a" opacity="0.6"/>
        <!-- Mid mountains -->
        <polygon points="0,600 100,350 250,280 380,340 500,230 600,310 720,200 850,290 950,220 1050,300 1200,240 1350,310 1440,280 1440,600" fill="#2a2550"/>
        <!-- Elbrus twin peaks -->
        <polygon points="500,600 620,180 660,150 700,155 740,145 780,175 900,600" fill="#3a3570"/>
        <!-- Snow caps on Elbrus -->
        <polygon points="620,180 640,165 660,150 680,152 700,155 690,170 670,168 650,172" fill="rgba(255,255,255,0.7)"/>
        <polygon points="700,155 720,148 740,145 760,152 780,175 765,168 745,160 725,158" fill="rgba(255,255,255,0.65)"/>
        <!-- Snow streaks -->
        <polygon points="655,165 660,200 650,200" fill="rgba(255,255,255,0.2)"/>
        <polygon points="675,160 680,210 670,205" fill="rgba(255,255,255,0.15)"/>
        <polygon points="735,155 740,200 730,195" fill="rgba(255,255,255,0.2)"/>
        <polygon points="755,160 760,215 750,210" fill="rgba(255,255,255,0.15)"/>
        <!-- Front foothills -->
        <polygon points="0,600 50,450 180,480 300,420 450,470 550,430 650,460 750,400 850,450 1000,410 1100,450 1250,400 1350,440 1440,420 1440,600" fill="#1a1535"/>
        <!-- Foreground -->
        <polygon points="0,600 0,520 200,500 400,530 600,510 800,540 1000,500 1200,530 1440,510 1440,600" fill="#110f25"/>
      </svg>
    </div>
  </div>

  <!-- Password Modal -->
  <div class="overlay" id="overlay">
    <div class="modal" id="modal">
      <h1>Happy Birthday!</h1>
      <p class="subtitle">There's a special surprise waiting for you...<br>but first, guess the password!</p>
      <div class="input-group">
        <input type="text" id="passwordInput" placeholder="Enter the magic word..." autocomplete="off" autofocus />
      </div>
      <button class="btn" id="submitBtn">Open My Surprise</button>
      <div class="error-msg" id="errorMsg"></div>
      <div class="hearts">&#10084; &#10084; &#10084;</div>
    </div>
  </div>

  <!-- Video Container -->
  <div class="video-container" id="videoContainer">
    <h2>This is for you, my love!</h2>
    <div class="video-wrapper">
      <iframe
        id="videoFrame"
        src=""
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen
      ></iframe>
    </div>
  </div>

  <script>
    // =============================================
    // CONFIGURATION — change these to customize!
    // =============================================
    const PASSWORD = 'love';
    const YOUTUBE_VIDEO_ID = 'dQw4w9WgXcQ'; // Replace with your actual YouTube video ID
    // =============================================

    const cuteErrors = [
      "Nope! But you're adorable for trying! 🥰",
      "Wrong password, cutie! Try again~ 💕",
      "Hmm, not quite! Think about what I love most... 💖",
      "So close! (not really, but I believe in you!) 🌸",
      "The mountains are waiting... try harder, love! 🏔️",
      "Even Elbrus couldn't be this hard to crack! 😄",
      "You're warming up! ...or maybe not, but you're still cute! 💗",
      "That's not it, but your determination is attractive! 😘",
      "Nuh-uh! Hint: it's something very special between us 💝",
      "Wrong again! But every wrong guess makes you cuter~ 🦋",
      "Keep trying, birthday girl! The surprise is worth it! 🎂",
      "Not the password, but you're the key to my heart! 🔑",
      "Oops! Maybe try thinking with your heart, not your head~ 💓",
      "The mountains say no... but I say keep going! ⛰️",
      "Almost! Just kidding. Not even close! But I love you! 💘",
    ];

    let errorIndex = 0;

    // Generate stars
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 50 + '%';
      star.style.width = (Math.random() * 2 + 1) + 'px';
      star.style.height = star.style.width;
      star.style.animationDelay = (Math.random() * 3) + 's';
      star.style.animationDuration = (Math.random() * 2 + 2) + 's';
      starsContainer.appendChild(star);
    }

    // Password check
    const input = document.getElementById('passwordInput');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');
    const overlay = document.getElementById('overlay');
    const modal = document.getElementById('modal');
    const videoContainer = document.getElementById('videoContainer');
    const videoFrame = document.getElementById('videoFrame');

    function checkPassword() {
      const guess = input.value.trim().toLowerCase();
      if (!guess) return;

      if (guess === PASSWORD.toLowerCase()) {
        overlay.classList.add('hidden');
        setTimeout(() => {
          videoFrame.src = `https://www.youtube.com/embed/${YOUTUBE_VIDEO_ID}?autoplay=1&rel=0`;
          videoContainer.classList.add('visible');
          spawnHearts();
        }, 800);
      } else {
        modal.classList.add('shake');
        setTimeout(() => modal.classList.remove('shake'), 500);
        errorMsg.textContent = cuteErrors[errorIndex % cuteErrors.length];
        errorIndex++;
        input.value = '';
        input.focus();
      }
    }

    submitBtn.addEventListener('click', checkPassword);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') checkPassword();
    });

    // Falling hearts effect when video shows
    function spawnHearts() {
      const heartEmojis = ['💖', '💕', '💗', '💝', '🩷', '✨', '🌸'];
      let count = 0;
      const interval = setInterval(() => {
        if (count > 40) { clearInterval(interval); return; }
        const heart = document.createElement('div');
        heart.className = 'falling-heart';
        heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
        heart.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
        document.body.appendChild(heart);
        heart.addEventListener('animationend', () => heart.remove());
        count++;
      }, 300);
    }
  </script>
</body>
</html>
